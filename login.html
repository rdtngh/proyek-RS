<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | HETS</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <div class="brand-mark">RS</div>
            <div class="brand-copy">
              <h1>Hospital Employee Training System</h1>
              <p>RS Advent Bandar Lampung</p>
            </div>
          </a>
        </div>
      </header>

      <main class="auth-shell">
        <section class="auth-card">
          <h2>Masuk ke akun Anda</h2>
          <p>Gunakan akun demo untuk melihat alur pelatihan.</p>
          <form data-login-form>
            <div class="form-group">
              <label for="username">Username</label>
              <input id="username" name="username" type="text" placeholder="cth. employee01" />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="Masukkan password" />
            </div>
            <div class="form-actions">
              <a class="muted-link" href="index.html">Kembali ke beranda</a>
              <button class="btn btn-primary" type="submit">Login</button>
            </div>
          </form>
        </section>
      </main>

      <footer class="footer">
        <div class="footer-inner">
          <span>© 2026 RS Advent Bandar Lampung</span>
          <span>Prototype HETS</span>
        </div>
      </footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
