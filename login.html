<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | HETS</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <div class="brand-mark">RS</div>
            <div class="brand-copy">
              <h1>RS Advent Bandar Lampung</h1>
              <p>Sistem Pelatihan Karyawan Rumah Sakit</p>
            </div>
          </a>
        </div>
      </header>

      <main class="auth-shell">
        <section class="auth-card">
          <h2>Data Diri Peserta</h2>
          <p>Semua bagian wajib diisi sebelum Anda dapat melanjutkan ke sesi pertanyaan.</p>
          <form data-login-form>
            <div class="form-group">
              <label for="unit">Unit Anda Bekerja / Unit Praktek</label>
              <input id="unit" name="unit" type="text" placeholder="Contoh: IGD" required />
            </div>
            <div class="form-group">
              <label for="name">Nama</label>
              <input id="name" name="name" type="text" placeholder="Masukkan Nama Lengkap Anda" required />
            </div>
            <div class="form-group">
              <label for="school">Asal Sekolah / Kampus / Universitas</label>
              <input id="school" name="school" type="text" placeholder="Contoh: Institut Teknologi Sumatera" required />
            </div>
            <div class="form-group">
              <label for="phone">No HP yang bisa dihubungi</label>
              <input id="phone" name="phone" type="tel" placeholder="Contoh: 08123456789" required />
            </div>
            <div class="form-group">
              <label for="address">Domisili / Alamat Tempat Tinggal Sekarang</label>
              <input id="address" name="address" placeholder="Tuliskan Alamat Lengkap Anda" required />
            </div>
            <div class="form-group">
              <label for="position">Saat ini saya sebagai ........ di Rumah Sakit Advent Bandar Lampung</label>
              <select id="position" name="position" required>
                <option value="">Pilih Status</option>
                <option value="mahasiswa-pkl">Mahasiswa PKL</option>
                <option value="calon-karyawan">Calon Karyawan</option>
                <option value="dokter-internship">Dokter Internship</option>
                <option value="trainee">Trainee (Magang)</option>
                <option value="mahasiswa-internship">Mahasiswa Internship</option>
              </select>
            </div>
            <div class="form-actions">
              <a class="muted-link" href="index.html">Kembali ke beranda</a>
              <button class="btn btn-primary" type="submit">Selanjutnya</button>
            </div>
          </form>
        </section>
      </main>

      <footer class="footer">
        <div class="footer-inner">
          <span>© 2026 RS Advent Bandar Lampung</span>
          <span>Pelatihan Karyawan</span>
        </div>
      </footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
