<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz | HETS</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/quiz.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <div class="brand-mark">RS</div>
            <div class="brand-copy">
              <h1>Hospital Employee Training System</h1>
              <p>Assessment Pelatihan</p>
            </div>
          </a>
          <div class="nav-links">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
          </div>
        </div>
      </header>

      <main class="quiz-layout">
        <div class="quiz-shell">
          <div class="quiz-header">
            <strong id="question-counter">Soal 1 dari 10</strong>
            <div class="progress-block">
              <div class="progress-bar"><div class="progress-fill" id="quiz-progress-fill"></div></div>
              <small id="quiz-progress-text">0%</small>
            </div>
          </div>

          <section class="question-card">
            <div id="question-content"></div>
            <div class="quiz-actions">
              <button class="btn btn-secondary" id="prev-btn">Previous</button>
              <button class="btn btn-primary" id="next-btn">Next</button>
            </div>
          </section>
        </div>
      </main>

      <footer class="footer">
        <div class="footer-inner">
          <span>© 2026 RS Advent Bandar Lampung</span>
          <span>Prototype HETS</span>
        </div>
      </footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/quiz.js"></script>
  </body>
</html>
