<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materi | HETS</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body data-page="materi">
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <div class="brand-mark">RS</div>
            <div class="brand-copy">
              <h1>Hospital Employee Training System</h1>
              <p>Konten Pelatihan</p>
            </div>
          </a>
          <div class="nav-links">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="index.html">Logout</a>
          </div>
        </div>
      </header>

      <main class="dashboard-main">
        <div class="container">
          <section class="dashboard-grid">
            <div class="panel-card">
              <div class="dashboard-header">
                <div>
                  <h2 data-training-title>Judul Pelatihan</h2>
                  <p data-training-description>Deskripsi pelatihan</p>
                </div>
                <div class="welcome-badge">Progress belajar</div>
              </div>
              <div class="progress-block" style="margin-top: 16px;">
                <div class="progress-bar"><div class="progress-fill" data-progress-fill></div></div>
                <small data-progress-text>0%</small>
              </div>
            </div>

            <div class="panel-card">
              <h3>Daftar Materi</h3>
              <div class="module-list" data-module-list></div>
              <div class="quiz-cta">
                <a class="btn btn-primary" href="quiz.html" data-quiz-button style="display:none;">Mulai Quiz</a>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer class="footer">
        <div class="footer-inner">
          <span>© 2026 RS Advent Bandar Lampung</span>
          <span>Prototype HETS</span>
        </div>
      </footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
